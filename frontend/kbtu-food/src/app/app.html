@if (isLoggedIn) {
  <nav class="navbar">
    <div class="nav-logo">KBTU<span>food</span></div>
    <div class="nav-links">
      <a routerLink="/menu">Меню</a>
      <a routerLink="/orders">Заказы</a>
      <a routerLink="/cart">Корзина</a>
    </div>
    <button class="logout-btn" (click)="logout()">Выйти</button>
  </nav>
}

<router-outlet />

@if (isLoggedIn && cartCount > 0) {
  <div class="cart-bar" routerLink="/cart">
    <span class="cart-bar-info">{{ cartCount }} блюд на {{ cartTotal | number }} ₸</span>
    <span class="cart-bar-action">Смотреть заказ →</span>
  </div>
}
